/* PANTALLA 1 */
#pantallaInicio{
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, #200005, #000);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.titulo{
  position: fixed !important;
  top: 10vh !important;
  left: 50%;
  transform: translateX(-50%) !important;

  margin: 0 !important;
  bottom: auto !important;

  color: #ffe600;
  font-size: clamp(26px, 4vw, 44px);
  letter-spacing: 10px;
  font-weight: 800;
  text-align: center;
  z-index: 9999;

  text-shadow: 0 0 14px rgba(255, 0, 80, .6);
}

.subtitulo{
  position: fixed;
  top: 70vh;                 /* debajo del corazón */
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;

  color: #ffe600;
  font-size: clamp(14px, 2vw, 20px);
  letter-spacing: 6px;
  font-weight: 700;
  text-align: center;

  text-shadow:
    0 0 8px rgba(255, 0, 80, .7),
    0 0 18px rgba(255, 0, 80, .5),
    0 0 28px rgba(255, 0, 80, .3);

  opacity: 0.9;
}



#pantallaFlores{
  position: fixed;
  inset: 0;
  display: none;              /* se activa con el click */
  justify-content: center;
  align-items: flex-end;      /* para que las flores salgan desde abajo */
  overflow: hidden;
  background: radial-gradient(circle at center, #200005, #000);
}


/* corazón */
.corazon{
  font-size:70px;
  animation: latido 1s infinite;
  cursor:pointer;
  text-shadow:0 0 15px #ff2d55,0 0 30px #ff2d55;
}

@keyframes latido{
  0%{transform:scale(1);}
  25%{transform:scale(1.2);}
  50%{transform:scale(1);}
  75%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/*NOTAS*/

.nota{
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  z-index: 9999;

  /* 👇 OSCURECE EL FONDO */
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(2px);
}


.hidden{ display:none; }

/* decoraciones como ya las tienes */
.decoracion{ position:absolute; font-size:22px; opacity:0.3; }
.arriba{ top:8px; left:12px; }
.arriba2{ top:8px; right:12px; }
.abajo{ bottom:8px; left:12px; }
.abajo2{ bottom:8px; right:12px; }

<script>
function mostrarFlores(){
  document.getElementById("pantallaInicio").style.display="none";
  document.getElementById("pantallaFlores").style.display="flex";

  // 2) despausa animaciones (QUITAMOS container recién aquí)
    document.body.classList.remove("container");

    // 3) reproduce audio (autoplay casi siempre se bloquea hasta interacción)
    const audio = document.querySelector("audio");
    if(audio){
      audio.currentTime = 0;
      audio.play().catch(()=>{});
    }
}

/* partículas */
for(let i=0;i<60;i++){
  let p=document.createElement("div");
  p.className="particula";
  p.style.top=Math.random()*100+"vh";
  p.style.left=Math.random()*100+"vw";
  document.body.appendChild(p);
}


</script>
